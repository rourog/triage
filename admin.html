<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triage Express - Panel Admin</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0..1,0" rel="stylesheet" />

  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --line: #cbd5e1;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #0ea5a6;
      --danger: #ef4444;
      --c-urgencias: #f59e0b; 
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem;
      background-color: var(--bg); 
      background-image: 
        radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.03) 100%),
        radial-gradient(rgba(100, 116, 139, 0.15) 1.5px, transparent 1.5px);
      background-size: 100% 100%, 22px 22px;
      background-position: center center, 0 0;
      color: var(--text); font-family: 'Oswald', ui-sans-serif, system-ui, sans-serif;
    }

    .material-symbols-rounded {
      font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 24;
      font-size: inherit; vertical-align: middle; line-height: 1; flex-shrink: 0;
    }
    .flex-center { display: inline-flex; align-items: center; gap: 8px; justify-content: center; }

    .header-admin { text-align: center; margin-bottom: 2rem; }
    .header-admin h1 { margin: 0; font-size: 3rem; color: var(--brand); line-height: 1.1; text-transform: uppercase; }
    .header-admin p { margin: 0; color: var(--muted); font-family: system-ui, sans-serif; font-weight: bold; letter-spacing: 1px; }

    .admin-panel {
      background: var(--panel); width: 100%; max-width: 800px;
      border-radius: 1rem; border: 2px solid var(--line);
      box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.1); padding: 1.5rem;
    }

    .controls-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--bg);
    }

    .btn-toggle {
      background: #f1f5f9; border: 2px solid var(--line); color: var(--brand);
      padding: 0.6rem 1.2rem; font-family: 'Oswald', sans-serif; font-size: 1.1rem;
      font-weight: 700; border-radius: 0.8rem; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 0 var(--line); text-transform: uppercase;
    }
    .btn-toggle:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

    .status-msg { font-family: 'Share Tech Mono', monospace; color: var(--c-urgencias); font-weight: bold; }

    .data-table { width: 100%; border-collapse: collapse; font-family: system-ui, sans-serif; }
    .data-table th { text-align: left; padding: 0.8rem 0.5rem; color: var(--muted); text-transform: uppercase; font-size: 0.9rem; border-bottom: 2px solid var(--line); }
    .data-table td { padding: 0.8rem 0.5rem; border-bottom: 1px solid var(--bg); vertical-align: middle; }
    .data-table tr:hover td { background-color: #f8fafc; }
    
    .td-score, .td-date { font-family: 'Share Tech Mono', monospace; font-weight: bold; }
    .td-name { font-weight: 600; font-size: 1.1rem; text-transform: uppercase; }
    
    .btn-delete {
      background: #fef2f2; color: var(--danger); border: 1px solid #fca5a5;
      padding: 0.4rem; border-radius: 0.4rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-delete:hover { background: var(--danger); color: white; }
    .btn-delete:active { transform: scale(0.9); }

  </style>
</head>
<body>

  <div class="header-admin">
    <h1>Jefatura de Urgencias</h1>
    <p>PANEL DE CONTROL DE SIMULACIONES</p>
  </div>

  <div class="admin-panel">
    <div class="controls-row">
      <h2 id="viewTitle" style="margin:0; font-size: 1.5rem; color: var(--text);">TOP DIARIO</h2>
      <div class="flex-center">
        <span id="statusIndicator" class="status-msg"></span>
        <button id="btnSwitchView" class="btn-toggle flex-center" onclick="cambiarVista()">
          <span class="material-symbols-rounded">public</span> VER GLOBAL
        </button>
      </div>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>Rango</th>
          <th>Doctor</th>
          <th>Puntaje</th>
          <th>Fecha</th>
          <th style="text-align: center;">Acción</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="5" style="text-align: center; color: var(--muted); font-style: italic;">Cargando base de datos...</td></tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, getDocs, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Misma configuración que tu juego principal
    const firebaseConfig = {
      apiKey: "AIzaSyBpzA-cDTTdHChQTmBsGMNmbD57RTXcKAo",
      authDomain: "triage-express.firebaseapp.com",
      projectId: "triage-express",
      storageBucket: "triage-express.firebasestorage.app",
      messagingSenderId: "467968411541",
      appId: "1:467968411541:web:cf4b64ae54be17c456189c",
      measurementId: "G-T63Q16GQX3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let vistaActual = 'daily'; // Por defecto diario

    // Exponemos las funciones a window para poder usarlas en los botones HTML
    window.cargarDatos = async function() {
      const tbody = document.getElementById('tableBody');
      const status = document.getElementById('statusIndicator');
      status.textContent = "Sincronizando...";
      tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--muted);">Buscando expedientes...</td></tr>';

      try {
        let q;
        if (vistaActual === 'daily') {
           const hoy = new Date();
           const fechaString = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(hoy.getDate()).padStart(2, '0')}`;
           q = query(collection(db, "leaderboard"), where("fecha", "==", fechaString), orderBy("score", "desc"), orderBy("timestamp", "asc"), limit(50));
        } else {
           q = query(collection(db, "leaderboard"), orderBy("score", "desc"), orderBy("timestamp", "asc"), limit(50));
        }
        
        const querySnapshot = await getDocs(q);
        let html = '';
        let rank = 1;

        if (querySnapshot.empty) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--muted); font-style: italic;">No hay registros para mostrar.</td></tr>';
            status.textContent = "";
            return;
        }

        querySnapshot.forEach((documento) => {
          const data = documento.data();
          const docId = documento.id; // ¡ESTE ES EL ID SECRETO PARA BORRAR!
          
          html += `
            <tr>
              <td><span style="font-family: 'Oswald', sans-serif; font-size: 1.2rem; font-weight: bold; color: var(--muted);">#${rank}</span></td>
              <td class="td-name">${data.name}</td>
              <td class="td-score">${data.score}</td>
              <td class="td-date">${data.fecha}</td>
              <td style="text-align: center;">
                <button class="btn-delete flex-center" onclick="borrarRegistro('${docId}', '${data.name}')" title="Eliminar registro">
                  <span class="material-symbols-rounded">delete</span>
                </button>
              </td>
            </tr>
          `;
          rank++;
        });

        tbody.innerHTML = html;
        status.textContent = "";

      } catch (e) {
        console.error("Error cargando datos: ", e);
        status.textContent = "Error de conexión";
        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--danger);">Error conectando con Firebase. Verifica la consola.</td></tr>';
      }
    };

    window.borrarRegistro = async function(docId, playerName) {
      // Doble confirmación para evitar accidentes
      if(confirm(`⚠️ ¿Estás seguro de que deseas eliminar permanentemente el récord de "${playerName}"?`)) {
        try {
          document.getElementById('statusIndicator').textContent = "Borrando...";
          await deleteDoc(doc(db, "leaderboard", docId));
          alert(`El registro de ${playerName} ha sido eliminado con éxito.`);
          window.cargarDatos(); // Recargar la tabla
        } catch (e) {
          console.error("Error al borrar: ", e);
          alert("Hubo un error al intentar borrar el registro.");
        }
      }
    };

    window.cambiarVista = function() {
      const btn = document.getElementById('btnSwitchView');
      const title = document.getElementById('viewTitle');
      
      if (vistaActual === 'daily') {
          vistaActual = 'global';
          btn.innerHTML = '<span class="material-symbols-rounded">today</span> VER HOY';
          title.textContent = 'TOP GLOBAL (Mejores 50)';
      } else {
          vistaActual = 'daily';
          btn.innerHTML = '<span class="material-symbols-rounded">public</span> VER GLOBAL';
          title.textContent = 'TOP DIARIO (Mejores 50)';
      }
      window.cargarDatos();
    };

    // Cargar datos iniciales al abrir la página
    window.onload = () => {
      window.cargarDatos();
    };

  </script>
</body>
</html>
